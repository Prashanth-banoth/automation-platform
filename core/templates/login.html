<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login / Register</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Enter username" required><br><br>
    <input type="text" name="phone" placeholder="Enter phone number" required><br><br>

    <button type="submit">Login</button>
</form>

</body>
</html>
